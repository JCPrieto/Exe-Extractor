name: Release

on:
  workflow_run:
    workflows: [ "CI" ]
    branches:
      - master
    types:
      - completed

jobs:
  release:
    if: >
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'master' &&
        github.event.workflow_run.repository.full_name == github.repository &&
        github.event.workflow_run.head_repository.full_name == github.repository &&
        !github.event.workflow_run.head_repository.fork
      }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release-artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Read project version
        id: version
        shell: bash
        run: |
          app_version="$(tr -d '[:space:]' < release-artifacts/project-version.txt)"
          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"

      - name: Validate release artifacts
        shell: bash
        run: |
          test -n "${{ steps.version.outputs.app_version }}"
          test -n "$(find release-artifacts -maxdepth 1 -name '*.jar' -print -quit)"
          test -n "$(find release-artifacts -maxdepth 1 -name '*.zip' -print -quit)"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.app_version }}
          name: v${{ steps.version.outputs.app_version }}
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            release-artifacts/*.jar
            release-artifacts/*.zip
